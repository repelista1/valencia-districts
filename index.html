<script>
var tip=document.getElementById('tip');
document.querySelector('svg').addEventListener('mousemove',function(e){
  var t=e.target;
  if(t.tagName==='path'&&t.dataset.n){
    tip.innerHTML='<b style="font-weight:600">'+t.dataset.n+'</b><br>'+t.dataset.r;
    var x=e.clientX+14,y=e.clientY+14;
    if(x>innerWidth-190)x-=205;
    if(y>innerHeight-60)y-=75;
    tip.style.left=x+'px';tip.style.top=y+'px';tip.style.display='block';
  } else tip.style.display='none';
});
document.querySelector('svg').addEventListener('mouseleave',function(){tip.style.display='none'});
